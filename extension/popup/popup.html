<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillman</title>
  <!-- FIX #1: Fonts are now bundled locally — no external requests, CSP-safe -->
  <link rel="stylesheet" href="../assets/fonts/fonts.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-mark"><span class="logo-s">S</span></div>
        <div class="logo-text">
          <span class="logo-name">skillman</span>
          <span class="logo-tag">for Claude</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="btn-url" title="Install from URL">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </button>
        <button class="btn-icon" id="btn-refresh" title="Refresh registry">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M8 16H3v5"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- URL install panel -->
    <div class="url-panel" id="url-panel" style="display:none">
      <div class="url-panel-inner">
        <div class="url-panel-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          Install from GitHub
        </div>
        <div class="url-supported">
          <span class="url-supported-tag">folder URL</span>
          <span class="url-supported-tag">.skill file URL</span>
          <span class="url-supported-tag">raw URL</span>
        </div>
        <textarea id="url-textarea" class="url-textarea" placeholder="Paste one or more GitHub URLs, one per line:

https://github.com/user/repo/tree/main/skill-one
https://github.com/user/repo/tree/main/skill-two" rows="4"></textarea>
        <div class="url-hint" id="url-hint"></div>
        <button class="btn-url-install" id="btn-url-install">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Install from URL
        </button>
      </div>
    </div>

    <!-- Search + Filter -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="Search skills..." class="search-input" />
      </div>
      <div class="tags" id="tag-filters">
        <button class="tag active" data-tag="all">All</button>
      </div>
    </div>

    <!-- Skills list -->
    <main class="skills-list" id="skills-list">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Loading registry…</span>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="selection-info">
        <span id="selected-count">0 skills selected</span>
      </div>
      <button class="btn-install" id="btn-install" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Install
      </button>
    </footer>

    <!-- Overlay — blurred dim + centered card -->
    <div class="overlay" id="overlay" style="display:none">
      <div class="overlay-dim"></div>
      <div class="overlay-content">
        <div class="install-orb">
          <div class="orb-ring orb-ring-1"></div>
          <div class="orb-ring orb-ring-2"></div>
          <span class="install-orb-icon" id="orb-icon">⚡</span>
        </div>
        <div class="install-title">Installing skills</div>
        <div class="bg-notice">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Installing in the background — no tab switching
        </div>
        <div class="install-status" id="progress-subtitle">Preparing…</div>
        <div class="progress-items" id="progress-items"></div>
        <button class="btn-done" id="btn-done" style="display:none">Done</button>
      </div>
    </div>

  </div>
  <script src="minizip.js"></script>
  <script src="popup.js"></script>
</body>
</html>
